name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python-lint:
    name: Python (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff format check
        run: uv run ruff format --check tools/

      - name: Ruff lint
        run: uv run ruff check tools/

  cpp-format:
    name: C++ (clang-format)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src include tests \
            -name "*.cpp" -o -name "*.h" \
          | xargs clang-format --dry-run --Werror

  cpp-build:
    name: C++ build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update 
          sudo apt-get install -y \ 
          cmake \ 
          ninja-build \ 
          libgtest-dev \ 
          libtbb-dev \ 
          libembree-dev

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: cd build && ./tests
